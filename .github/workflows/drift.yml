name: Drift Detection

on:
  schedule:
    - cron: "0 3 * * 1"
  workflow_dispatch: {}

jobs:
  drift:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v6
        with:
          node-version: 20
      - run: npm ci
      - name: Run drift check
        run: npm run drift
        env:
          OPENAPI_URL: ${{ vars.OPENAPI_URL || 'https://api.trello.com/1/openapi.json' }}
      - name: Upload drift report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: drift-report
          path: test-results/drift-report.json

