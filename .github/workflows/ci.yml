name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: ['**']

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    continue-on-error: ${{ matrix.os == 'windows-latest' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Functional tests
        run: npm run test:functional
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}

      - name: Negative tests
        run: npm run test:negative
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}

      - name: Upload junit.xml
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-${{ matrix.os }}
          path: test-results/junit.xml
          if-no-files-found: ignore
          retention-days: 5

      - name: Upload metrics
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-${{ matrix.os }}
          path: |
            test-results/metrics.jsonl
            test-results/metrics-summary.json
          if-no-files-found: ignore
          retention-days: 5

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ matrix.os }}
          path: playwright-report
          if-no-files-found: ignore
          retention-days: 5
      - name: Analyze Flaky
        if: always()
        run: npm run flaky:analyze
        env:
          FAIL_ON_FLAKY: ${{ vars.FAIL_ON_FLAKY || '0' }}
      - name: Upload flaky log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: flaky-${{ matrix.os }}
          path: test-results/flaky.jsonl
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize metrics
        if: always()
        run: |
          node -e "const fs=require('fs');let s;try{s=JSON.parse(fs.readFileSync('test-results/metrics-summary.json','utf8'));}catch(e){process.exit(0)};let lines=['# Metrics Summary',`Generated: ${s.generatedAt}`,''];for(const [k,v] of Object.entries(s.summary)){lines.push(`- ${k}: count=${v.count}, avg=${v.avgMs}ms, p95=${v.p95Ms}ms`)};fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n')+'\n');"
      - name: Enforce p95 gates
        if: always()
        run: node scripts/enforce-sla.js
      - name: Export metrics CSV
        if: always()
        run: npm run metrics:export
      - name: Push metrics to InfluxDB
        if: ${{ always() && secrets.INFLUX_URL != '' && secrets.INFLUX_TOKEN != '' && secrets.INFLUX_ORG != '' && secrets.INFLUX_BUCKET != '' }}
        run: npm run metrics:push
        env:
          INFLUX_URL: ${{ secrets.INFLUX_URL }}
          INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
          INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
          INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}

  perf:
    if: ${{ vars.ENABLE_PERF == '1' || secrets.ENABLE_PERF == '1' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Run perf tests
        run: npm run test:perf
        env:
          TRELLO_KEY: ${{ secrets.TRELLO_KEY }}
          TRELLO_TOKEN: ${{ secrets.TRELLO_TOKEN }}
          ENABLE_PERF: 1
          PERF_WORKERS: ${{ vars.PERF_WORKERS || '3' }}
          PERF_REPEAT: ${{ vars.PERF_REPEAT || '5' }}

      - name: Upload junit.xml (perf)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-perf
          path: test-results/junit.xml
          if-no-files-found: ignore
          retention-days: 7

      - name: Upload metrics (perf)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: metrics-perf
          path: |
            test-results/metrics.jsonl
            test-results/metrics-summary.json
          if-no-files-found: ignore
          retention-days: 7

      - name: Summarize metrics (perf)
        if: always()
        run: |
          node -e "const fs=require('fs');let s;try{s=JSON.parse(fs.readFileSync('test-results/metrics-summary.json','utf8'));}catch(e){process.exit(0)};let lines=['# Metrics Summary (perf)',`Generated: ${s.generatedAt}`,''];for(const [k,v] of Object.entries(s.summary)){lines.push(`- ${k}: count=${v.count}, avg=${v.avgMs}ms, p95=${v.p95Ms}ms`)};fs.appendFileSync(process.env.GITHUB_STEP_SUMMARY,lines.join('\n')+'\n');"
      - name: Enforce p95 gates (perf)
        if: always()
        run: node scripts/enforce-sla.js
      - name: Export metrics CSV (perf)
        if: always()
        run: npm run metrics:export
      - name: Push metrics to InfluxDB (perf)
        if: ${{ always() && secrets.INFLUX_URL != '' && secrets.INFLUX_TOKEN != '' && secrets.INFLUX_ORG != '' && secrets.INFLUX_BUCKET != '' }}
        run: npm run metrics:push
        env:
          INFLUX_URL: ${{ secrets.INFLUX_URL }}
          INFLUX_TOKEN: ${{ secrets.INFLUX_TOKEN }}
          INFLUX_ORG: ${{ secrets.INFLUX_ORG }}
          INFLUX_BUCKET: ${{ secrets.INFLUX_BUCKET }}
